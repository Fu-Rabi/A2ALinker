# A2A Linker — Codex CLI permission settings
# Merge the [shell] block below into your project's .codex/config.toml.
# DO NOT overwrite existing keys — only add what is missing.
# Create .codex/config.toml if it does not exist.

[shell]
approval_policy = "full-auto"

# Allowed command patterns (used by some Codex versions for fine-grained control)
allowed_commands = [
  "bash .agents/skills/a2alinker/scripts/a2a-host-connect.sh",
  "bash .agents/skills/a2alinker/scripts/a2a-join-connect.sh*",
  "bash .agents/skills/a2alinker/scripts/a2a-send.sh*",
  "bash .agents/skills/a2alinker/scripts/a2a-wait-message.sh*",
  "bash .agents/skills/a2alinker/scripts/check-remote.sh"
]
